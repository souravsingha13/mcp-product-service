<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Walton MCP Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f7fb;
            color: #222;
        }

        .app {
            max-width: 760px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            padding: 16px 20px;
            background: #0f766e;
            color: white;
        }

        .messages {
            height: 420px;
            overflow-y: auto;
            padding: 16px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .user {
            background: #dbeafe;
            margin-left: 40px;
        }

        .assistant {
            background: #ecfdf5;
            margin-right: 40px;
        }

        .composer {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-top: 1px solid #e5e7eb;
        }

        input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background: #0f766e;
            color: white;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.7;
            cursor: wait;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <h2>Walton MCP Chat</h2>
            <div>Ask for products or use a product UID like P-KB4FTE</div>
        </div>
        <div id="messages" class="messages"></div>
        <div class="composer">
            <input id="prompt" placeholder="Search for products..." />
            <button id="send">Send</button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('prompt');
        const buttonEl = document.getElementById('send');

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;
            addMessage('user', message);
            inputEl.value = '';
            buttonEl.disabled = true;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();
                addMessage('assistant', data.reply || 'No response');
            } catch (err) {
                addMessage('assistant', 'Request failed: ' + (err.message || err));
            } finally {
                buttonEl.disabled = false;
                inputEl.focus();
            }
        }

        buttonEl.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
